<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting — Conflict Studies &amp; Insights</title>
<script>
  // Any unknown path returns to the app root.
  // Works at user.github.io/<repo>/ (keeps the repo segment) and at a custom-domain root.
  (function () {
    var parts = location.pathname.split('/').filter(Boolean);
    var base = (location.hostname.endsWith('github.io') && parts.length) ? '/' + parts[0] + '/' : '/';
    location.replace(location.origin + base);
  })();
</script>
<meta http-equiv="refresh" content="1; url=/">
<style>
  html,body{height:100%;margin:0;background:#F1EDE3;color:#1C1B17;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center}
  .d{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;
     border-bottom:16px solid #C23A30;margin:0 auto 14px}
  a{color:#C23A30}
</style>
</head>
<body>
  <div>
    <div class="d"></div>
    <p>Taking you back to <strong>Conflict Studies &amp; Insights</strong>…</p>
    <p><a href="/">Tap here if you aren't redirected.</a></p>
  </div>
</body>
</html>
