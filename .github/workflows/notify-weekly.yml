name: Send new-brief push

# Manual trigger only — run this from the Actions tab whenever a new brief or
# edition is published, to push a "new brief" notification to subscribed devices.
# Requires a repo secret NOTIFY_TOKEN matching the Pages NOTIFY_TOKEN variable.

on:
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger push broadcast
        run: |
          if [ -z "${{ secrets.NOTIFY_TOKEN }}" ]; then
            echo "NOTIFY_TOKEN secret not set — skipping."; exit 0
          fi
          code=$(curl -sS -o /tmp/resp -w '%{http_code}' -X POST \
            -H "X-Notify-Token: ${{ secrets.NOTIFY_TOKEN }}" \
            https://csi-monthly-insights.pages.dev/api/notify)
          echo "HTTP $code"; cat /tmp/resp; echo
          [ "$code" = "200" ]
